services:
  api:
    build: .
    container_name: shop-api
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
       postgres:
        condition: service_healthy

  postgres:
    image: postgres:16
    healthcheck:
     test: ["CMD-SHELL", "pg_isready -U shop_user"]
     interval: 5s
     timeout: 5s
     retries: 5
    container_name: shop-postgres
    environment:
      POSTGRES_USER: shop_user
      POSTGRES_PASSWORD: w58gt32Utsl
      POSTGRES_DB: shop
    ports:
      - "5433:5432"
    volumes:
    - postgres_data:/var/lib/postgresql/data
    - ./init.sql:/docker-entrypoint-initdb.d/init.sql

volumes:
  postgres_data: